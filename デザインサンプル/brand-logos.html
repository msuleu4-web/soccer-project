<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8e4dc; font-family: 'Inter', sans-serif; padding: 24px; display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
.variant { display: flex; flex-direction: column; gap: 8px; }
.label { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #6b7280; }
.logo-box { padding: 20px 24px; border-radius: 10px; display: flex; align-items: center; }
.icon-box { padding: 12px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
  <div class="variant">
    <div class="label">Light BG</div>
    <div class="logo-box" style="background:#fff; border: 1px solid #e5e7eb;">
      <img src="../assets/goal-labo-logo.svg" height="55" alt="Goal Labo Logo">
    </div>
  </div>
  <div class="variant">
    <div class="label">Dark BG</div>
    <div class="logo-box" style="background:#050a14;">
      <img src="../assets/goal-labo-logo-dark.svg" height="55" alt="Goal Labo Logo Dark">
    </div>
  </div>
  <div class="variant">
    <div class="label">Icon Mark</div>
    <div class="icon-box" style="background:#fff; border: 1px solid #e5e7eb;">
      <img src="../assets/goal-labo-icon.svg" width="56" height="56" alt="Goal Labo Icon">
    </div>
  </div>
  <div class="variant">
    <div class="label">Icon on Dark</div>
    <div class="icon-box" style="background:#050a14;">
      <img src="../assets/goal-labo-icon.svg" width="56" height="56" alt="Goal Labo Icon">
    </div>
  </div>
</body>
</html>
