<svg width="680" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
  <title>Goal Labo Logo - Dark Background Version</title>
  <desc>Goal Labo logo variant for use on dark backgrounds</desc>
  
  <!-- Dark background reference (remove in production if needed) -->
  <rect x="0" y="0" width="680" height="220" fill="#0F3D2E"/>
  
  <!-- Soccer goal net icon -->
  <g transform="translate(100, 50)">
    <rect x="0" y="0" width="100" height="80" fill="none" stroke="#F5F1EA" stroke-width="4" stroke-linejoin="round"/>
    
    <line x1="20" y1="0" x2="20" y2="80" stroke="#F5F1EA" stroke-width="1" opacity="0.35"/>
    <line x1="40" y1="0" x2="40" y2="80" stroke="#F5F1EA" stroke-width="1" opacity="0.35"/>
    <line x1="60" y1="0" x2="60" y2="80" stroke="#F5F1EA" stroke-width="1" opacity="0.35"/>
    <line x1="80" y1="0" x2="80" y2="80" stroke="#F5F1EA" stroke-width="1" opacity="0.35"/>
    
    <line x1="0" y1="20" x2="100" y2="20" stroke="#F5F1EA" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="40" x2="100" y2="40" stroke="#F5F1EA" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="60" x2="100" y2="60" stroke="#F5F1EA" stroke-width="1" opacity="0.35"/>
    
    <circle cx="50" cy="40" r="14" fill="#00D26A"/>
    <circle cx="50" cy="40" r="14" fill="none" stroke="#F5F1EA" stroke-width="2"/>
    <polygon points="50,30 56,34 54,42 46,42 44,34" fill="#0F3D2E"/>
    
    <line x1="75" y1="40" x2="100" y2="40" stroke="#00D26A" stroke-width="2" stroke-dasharray="3 3" opacity="0.8"/>
  </g>
  
  <!-- Wordmark -->
  <text x="240" y="100" font-family="system-ui, -apple-system, 'Noto Sans JP', sans-serif" font-size="48" font-weight="900" fill="#F5F1EA" letter-spacing="-2">GOAL</text>
  <rect x="360" y="60" width="6" height="50" fill="#00D26A"/>
  <text x="380" y="100" font-family="system-ui, -apple-system, 'Noto Sans JP', sans-serif" font-size="48" font-weight="300" fill="#F5F1EA" letter-spacing="-1">LABO</text>
  
  <!-- Tagline -->
  <text x="240" y="130" font-family="system-ui, -apple-system, 'Noto Sans JP', sans-serif" font-size="11" font-weight="600" fill="#00D26A" letter-spacing="5">AI · ANALYTICS · NEWS</text>
  
  <!-- Japanese subtitle -->
  <text x="240" y="155" font-family="'Noto Sans JP', system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#F5F1EA" letter-spacing="3">ゴールラボ</text>
</svg>
